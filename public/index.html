<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMS Scraper Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>AMS Scraper Studio</h1>
        <p>Modernes Micro-SaaS für AMS-Stellenexporte als CSV und Excel.</p>
      </header>

      <section class="card">
        <h2>Suche</h2>
        <div class="grid basis-grid">
          <label>Suche nach<input id="query" placeholder="Beruf, Kompetenz, Unternehmen ..." /></label>
          <label>Ort<input id="location" placeholder="Ort, PLZ, Bundesland" /></label>
          <label>Umkreis (km)
            <select id="radius">
              <option value="0">Beliebig</option>
              <option value="5">5 km</option>
              <option value="10">10 km</option>
              <option value="25">25 km</option>
              <option value="50">50 km</option>
              <option value="100">100 km</option>
            </select>
          </label>
          <label>Max. Seiten<input id="maxPages" type="number" min="1" max="100" value="5" /></label>
          <label>Max. Jobs<input id="maxJobs" type="number" min="1" max="3000" value="200" /></label>
        </div>
      </section>

      <section class="card">
        <h2>Quelle der Stellenangebote</h2>
        <p class="muted">Zusätzlich zu AMS-Stellenangeboten:</p>
        <div class="option-list">
          <label class="check"><input type="checkbox" data-filter-key="JOB_OFFER_TYPE" value="SB_WKO" checked /> Unternehmensangebote aus dem AMS eJob-Room</label>
          <label class="check"><input type="checkbox" data-filter-key="JOB_OFFER_TYPE" value="IJ" checked /> Stellenangebote aus dem Internet</label>
          <label class="check"><input type="checkbox" data-filter-key="JOB_OFFER_TYPE" value="BA" checked /> Bundesagentur für Arbeit (DE)</label>
          <label class="check"><input type="checkbox" data-filter-key="JOB_OFFER_TYPE" value="BZ" checked /> Weitere Partnerbörse</label>
          <label class="check"><input type="checkbox" data-filter-key="JOB_OFFER_TYPE" value="TN" checked /> Tagesaktuelle Inserate</label>
        </div>
      </section>

      <section class="card filter-panels">
        <article class="panel">
          <h3>Arbeitszeit</h3>
          <div class="option-list">
            <label class="check"><input type="checkbox" data-filter-key="WORKING_TIME" value="VZ" /> Vollzeit</label>
            <label class="check"><input type="checkbox" data-filter-key="WORKING_TIME" value="TZ" /> Teilzeit</label>
          </div>
        </article>

        <article class="panel">
          <h3>Aktualität</h3>
          <div class="option-list">
            <label class="radio"><input type="radio" name="actuality" data-filter-key="ACTUALITY" value="" checked /> Alle</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="ACTUALITY" value="24H" /> in den letzten 24 Stunden</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="ACTUALITY" value="2D" /> in den letzten zwei Tagen</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="ACTUALITY" value="1W" /> in der letzten Woche</label>
            <label class="radio"><input type="radio" name="actuality" data-filter-key="ACTUALITY" value="1M" /> im letzten Monat</label>
          </div>
        </article>

        <article class="panel">
          <h3>Dienstverhältnis</h3>
          <div class="option-list">
            <label class="check"><input type="checkbox" data-filter-key="EMPLOYMENT_TYPE" value="WORKER_EMPLOYEE" /> ArbeiterInnen/Angestellte</label>
            <label class="check"><input type="checkbox" data-filter-key="EMPLOYMENT_TYPE" value="APPRENTICE" /> Lehrstelle</label>
            <label class="check"><input type="checkbox" data-filter-key="EMPLOYMENT_TYPE" value="SEASONAL" /> Saisonstelle</label>
            <label class="check"><input type="checkbox" data-filter-key="EMPLOYMENT_TYPE" value="HOLIDAY" /> Ferialstelle</label>
            <label class="check"><input type="checkbox" data-filter-key="EMPLOYMENT_TYPE" value="OTHER" /> Sonstiges Beschäftigungsverhältnis</label>
          </div>
        </article>

        <article class="panel">
          <h3>Ausbildung</h3>
          <div class="option-list">
            <label class="check"><input type="checkbox" data-filter-key="EDUCATION" value="COMPULSORY" /> Keine Ausbildung/Pflichtschule</label>
            <label class="check"><input type="checkbox" data-filter-key="EDUCATION" value="MIDDLE" /> Berufsbildende mittlere Schule</label>
            <label class="check"><input type="checkbox" data-filter-key="EDUCATION" value="APPRENTICE_MASTER" /> Lehre/Lehre mit Meisterprüfung</label>
            <label class="check"><input type="checkbox" data-filter-key="EDUCATION" value="MATURA" /> Matura</label>
            <label class="check"><input type="checkbox" data-filter-key="EDUCATION" value="UNIVERSITY" /> Fachhochschule/Universität</label>
          </div>
        </article>
      </section>

      <section class="card actions-card">
        <button id="run" type="button">Jetzt suchen & exportieren</button>
        <span id="status"></span>
      </section>

      <section class="card" id="resultCard" hidden>
        <div class="resultHead">
          <h2>Ergebnis</h2>
          <div class="downloads">
            <button class="ghost" id="csvBtn" type="button" disabled>CSV herunterladen</button>
            <button class="ghost" id="xlsxBtn" type="button" disabled>Excel herunterladen</button>
          </div>
        </div>
        <p id="summary"></p>
        <pre id="searchUrl"></pre>
        <div id="errors"></div>
        <div class="tableWrap"><table id="previewTable"></table></div>
      </section>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
